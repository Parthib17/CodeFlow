server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available, fall back to raw
    gzip_static on;

    # Gzip on-the-fly for anything not pre-compressed
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Long-term cache for hashed assets (Vite adds content hash to filenames)
    location ~* \.(?:js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html: no cache — browser always fetches latest, assets are cached by hash
    location / {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
